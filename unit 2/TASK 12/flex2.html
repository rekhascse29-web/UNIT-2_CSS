<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Advanced</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    .flex-container {
      display: flex;
      border: 2px solid #333;
      padding: 10px;
      height: 200px;
      gap: 10px; /* 🔹 Gap */
    }

    .box {
      background: teal;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 5px;
      width: 80px;
    }

    /* 🔹 Align Items */
    .align-start {
      align-items: flex-start;
    }

    .align-center {
      align-items: center;
    }

    .align-end {
      align-items: flex-end;
    }

    .align-stretch {
      align-items: stretch;
    }

    /* 🔹 Flex Wrap */
    .wrap {
      flex-wrap: wrap;
      height: auto;
    }

    /* 🔹 Order */
    .order1 {
      order: 1;
      background: red;
    }

    .order2 {
      order: 2;
      background: blue;
    }

    .order3 {
      order: 3;
      background: green;
    }

  </style>
</head>

<body>

  <h1>Flexbox Advanced Properties</h1>

  <!-- Align Items -->
  <div class="container">
    <h2>Align Items</h2>

    <h3>flex-start</h3>
    <div class="flex-container align-start">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h3>center</h3>
    <div class="flex-container align-center">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h3>flex-end</h3>
    <div class="flex-container align-end">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>
  </div>

  <!-- Flex Wrap -->
  <div class="container">
    <h2>Flex Wrap</h2>

    <div class="flex-container wrap">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </div>

  <!-- Order -->
  <div class="container">
    <h2>Order Property</h2>

    <div class="flex-container">
      <div class="box order3">1</div>
      <div class="box order1">2</div>
      <div class="box order2">3</div>
    </div>

    <p>Items are rearranged using <b>order</b> property.</p>
  </div>

</body>
</html>
