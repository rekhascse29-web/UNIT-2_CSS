<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Design Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* 🔹 MOBILE FIRST (Default Styles) */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 10px;
    }

    .row {
      display: flex;
      flex-direction: column;
    }

    .box {
      background: lightblue;
      margin: 10px 0;
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      font-size: 18px;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 10px;
    }

    /* 🔹 SMALL DEVICES (≥600px) */
    @media (min-width: 600px) {
      .container {
        max-width: 540px;
        margin: auto;
      }

      .box {
        background: lightgreen;
      }
    }

    /* 🔹 MEDIUM DEVICES (≥768px) */
    @media (min-width: 768px) {
      .container {
        max-width: 720px;
      }

      .row {
        flex-direction: row;
      }

      .box {
        flex: 1;
        margin: 10px;
        background: lightcoral;
      }
    }

    /* 🔹 LARGE DEVICES (≥992px) */
    @media (min-width: 992px) {
      .container {
        max-width: 960px;
      }

      .box {
        background: lightgoldenrodyellow;
      }
    }

    /* 🔹 EXTRA LARGE DEVICES (≥1200px) */
    @media (min-width: 1200px) {
      .container {
        max-width: 1140px;
      }

      .box {
        background: lightpink;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Responsive Web Design</h1>
    <p>Mobile First Approach with Media Queries</p>
  </header>

  <div class="container">
    <div class="row">
      <div class="box">Box 1</div>
      <div class="box">Box 2</div>
      <div class="box">Box 3</div>
    </div>
  </div>

  <footer>
    <p>© 2026 Responsive Design Example</p>
  </footer>

</body>
</html>
