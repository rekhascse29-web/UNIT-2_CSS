<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Grid Basics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    /* 🔹 Grid Container */
    .grid-container {
      display: grid;

      /* 🔹 Columns */
      grid-template-columns: repeat(3, 1fr);

      /* 🔹 Rows */
      grid-template-rows: 100px 100px;

      /* 🔹 Gap */
      gap: 15px;
    }

    .box {
      background: steelblue;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: 8px;
    }

  </style>
</head>

<body>

  <h1>CSS Grid Layout</h1>

  <div class="container">
    <div class="grid-container">

      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>

    </div>
  </div>

</body>
</html>
