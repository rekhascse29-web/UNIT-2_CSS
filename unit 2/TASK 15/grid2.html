<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced CSS Grid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    .box {
      background: teal;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 8px;
    }

    /* 🔹 Grid Template (Rows & Columns) */
    .grid-basic {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: 100px 100px;
      gap: 10px;
    }

    /* 🔹 Grid Template Areas */
    .grid-areas {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-areas:
        "header header header"
        "sidebar content ads"
        "footer footer footer";
      gap: 10px;
    }

    .header { grid-area: header; background: #3498db; }
    .sidebar { grid-area: sidebar; background: #2ecc71; }
    .content { grid-area: content; background: #e67e22; }
    .ads { grid-area: ads; background: #9b59b6; }
    .footer { grid-area: footer; background: #34495e; }

    /* 🔹 Auto-Fit */
    .auto-fit {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    /* 🔹 Auto-Fill */
    .auto-fill {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

  </style>
</head>

<body>

  <h1>Advanced CSS Grid</h1>

  <!-- Grid Template -->
  <div class="container">
    <h2>Grid Template (Rows & Columns)</h2>
    <div class="grid-basic">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </div>

  <!-- Grid Areas -->
  <div class="container">
    <h2>Grid Template Areas</h2>
    <div class="grid-areas">
      <div class="box header">Header</div>
      <div class="box sidebar">Sidebar</div>
      <div class="box content">Content</div>
      <div class="box ads">Ads</div>
      <div class="box footer">Footer</div>
    </div>
  </div>

  <!-- Auto-Fit -->
  <div class="container">
    <h2>Auto-Fit</h2>
    <div class="auto-fit">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
    </div>
  </div>

  <!-- Auto-Fill -->
  <div class="container">
    <h2>Auto-Fill</h2>
    <div class="auto-fill">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
    </div>
  </div>

</body>
</html>
