<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Layout Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
    }

    /* 🔹 Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #333;
      color: white;
      padding: 15px 30px;
      flex-wrap: wrap;
    }

    nav h2 {
      margin-bottom: 10px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: orange;
    }

    /* 🔹 Product Section */
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .price {
      color: green;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .btn {
      margin-top: auto;
      background: #333;
      color: white;
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn:hover {
      background: orange;
    }

    /* 🔹 Responsive */
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        text-align: center;
      }

      .nav-links {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <h2>My Store</h2>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- Product Listing -->
  <section class="products">

    <div class="card">
      <img src="https://picsum.photos/300/200?1" alt="Product 1">
      <div class="card-content">
        <h3>Headphones</h3>
        <p class="price">$49</p>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?2" alt="Product 2">
      <div class="card-content">
        <h3>Smart Watch</h3>
        <p class="price">$79</p>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?3" alt="Product 3">
      <div class="card-content">
        <h3>Camera</h3>
        <p class="price">$199</p>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>

  </section>

</body>
</html>
